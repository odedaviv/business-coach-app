<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כניסה | עודד אביב</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Segoe UI', Arial, sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-blue-800 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">עודד אביב</h1>
      <p class="text-gray-500 text-sm mt-1">יועץ עסקי</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">שם משתמש</label>
        <input name="name" type="text" autocomplete="username" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="הזן שם..." />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">סיסמה</label>
        <input name="password" type="password" autocomplete="current-password" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="הזן סיסמה..." />
      </div>
      <button type="submit"
              class="w-full bg-blue-800 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
        כניסה
      </button>
    </form>
  </div>
</body>
</html>
